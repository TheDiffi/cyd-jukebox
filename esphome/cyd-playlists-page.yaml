id: canvas_playlists
bg_color: 0x000000
scrollbar_mode: "OFF"
scroll_dir: NONE
widgets:
  # ── Header (flex row, vertically centered) ─────────────────────────
  - obj:
      width: 100%
      bg_opa: TRANSP
      layout:
        type: flex
        flex_flow: ROW
        flex_align_cross: CENTER
      pad_left: 4
      x: 0
      y: 0
      widgets:
        - button:
            id: btn_playlist_back
            width: 40
            bg_opa: TRANSP
            border_width: 0
            on_click:
              - lvgl.page.show: canvas_1
            widgets:
              - label:
                  text: "󰈙"
                  text_font: pixel_icon_font
                  align: CENTER
        - label:
            text: "Playlists"
            text_font: font_large
            on_click:
              - lvgl.page.show: canvas_1

  # ── Scrollable playlist list ────────────────────────────────────────
  # Add one button block per playlist. Copy the template below and fill
  # in the name and media_id for each entry.
  #
  # How to find the media_id for a playlist or album:
  #   1. In Home Assistant, go to Settings → Automations → Create new automation
  #   2. Add an action: "Media Player: Play Media"
  #   3. Select your Music Assistant media player entity
  #   4. Click "Browse media" and navigate to your playlist or album
  #   5. Select it, then switch the action to YAML view
  #   6. Copy the value of the "media_content_id" field — that is your media_id
  #
  # Template (copy and paste, then fill in name and media_id):
  #
  #   - button:
  #       width: 100%
  #       height: 44
  #       on_click:
  #         - script.execute:
  #             id: select_playlist
  #             popup_text: "My Playlist"
  #             media_id: "library://playlist/YOUR_ID"
  #         - lvgl.page.show: canvas_1
  #       widgets:
  #         - label:
  #             text: "My Playlist"
  #             text_font: font_small
  #             align: LEFT_MID
  # ──────────────────────────────────────────────────────────────────────

  - obj:
      id: playlist_scroll
      width: 100%
      x: 0
      y: 56
      height: 262 # 320 - 56
      bg_opa: TRANSP
      scrollbar_mode: AUTO
      layout:
        type: flex
        flex_flow: COLUMN
      pad_left: 8
      pad_right: 16
      pad_top: 4
      widgets:
        - button:
            width: 100%
            height: 44
            on_click:
              - script.execute:
                  id: select_playlist
                  popup_text: "My Playlist 1"
                  media_id: "library://playlist/YOUR_ID"
              - lvgl.page.show: canvas_1
            widgets:
              - label:
                  text: "My Playlist 1"
                  text_font: font_small
                  align: LEFT_MID

        - button:
            width: 100%
            height: 44
            on_click:
              - script.execute:
                  id: select_playlist
                  popup_text: "My Playlist 2"
                  media_id: "library://playlist/YOUR_ID"
              - lvgl.page.show: canvas_1
            widgets:
              - label:
                  text: "My Playlist 2"
                  text_font: font_small
                  align: LEFT_MID
